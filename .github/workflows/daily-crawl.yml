name: Daily Bonus Crawl

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: playwright install chromium
      
      - name: Run crawler
        run: python crawler.py
      
      - name: Verify output
        run: |
          if [ ! -f "output/bonuses.json" ]; then
            echo "❌ Error: bonuses.json not generated"
            exit 1
          fi
          size=$(wc -c < "output/bonuses.json")
          if [ $size -lt 1024 ]; then
            echo "❌ Error: bonuses.json too small ($size bytes)"
            exit 1
          fi
          echo "✅ bonuses.json generated successfully ($size bytes)"
      
      # 📁 Prepare GitHub Pages folder (always copy JSON first)
      - name: Prepare docs folder
        run: |
          mkdir -p docs/data
          cp output/bonuses.json docs/data/bonuses.json
          echo "✅ Copied bonuses.json to docs/data/"
      
      # 🌐 Copy HTML files if they exist (don't fail if missing)
      - name: Copy HTML files (optional)
        run: |
          if [ -f "github-pages/root-index.html" ]; then
            cp github-pages/root-index.html docs/index.html
            echo "✅ Copied root index.html"
          else
            echo "⚠️ github-pages/root-index.html not found, skipping"
          fi
          
          if [ -f "github-pages/data-index.html" ]; then
            cp github-pages/data-index.html docs/data/index.html
            echo "✅ Copied data index.html"
          else
            echo "⚠️ github-pages/data-index.html not found, skipping"
          fi
      
      - name: Commit and push results
        run: |
          git config user.name "Bato Crawler Bot"
          git config user.email "bot@bato.market"
          git rm --ignore-unmatch bonuses.json
          git add output/bonuses.json docs/
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "🤖 Update bonuses data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          }
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonuses-data
          path: output/bonuses.json
          retention-days: 30
      
      - name: Display summary
        run: |
          echo "📊 Crawl Summary:"
          python -c "
          import json
          with open('output/bonuses.json') as f:
              data = json.load(f)
          print(f\"  Total bonuses: {data['bonusCount']}\")
          print(f\"  Categories: {', '.join(data['categories'])}\")
          print(f\"  Total value: \${data['meta']['totalValue']:,}\")
          print(f\"  Last updated: {data['lastUpdated']}\")
          "

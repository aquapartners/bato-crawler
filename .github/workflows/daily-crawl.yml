name: Daily Bonus Crawl
on:
  schedule:
    - cron: '0 2 * * *'  # daily at 2am UTC
  workflow_dispatch:       # allow manual run

# Prevent multiple runs from conflicting
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   # Fetch full history for rebasing

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run crawler
        run: python crawler.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update bonuses.json [skip ci]"
          file_pattern: bonuses.json
          commit_user_name: github-actions
          commit_user_email: github-actions@github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          pull_options: '--rebase'   # Integrate remote changes before pushing

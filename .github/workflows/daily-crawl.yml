name: Daily Bonus Crawl
on:
  schedule:
    - cron: '*/5 * * * *' # runs every 5 minutes
  workflow_dispatch:       # allow manual run

# Prevent multiple runs from conflicting
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0                # fetch full history for rebasing
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Pull latest changes
        run: git pull --rebase origin ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 crawl4ai playwright

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run crawler
        run: python crawler.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update bonuses.json [skip ci]"
          file_pattern: bonuses.json
          commit_user_name: github-actions
          commit_user_email: github-actions@github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

name: Daily Bonus Crawl

on:
  schedule:
    # Run every 4 hours (6 times per day)
    - cron: '0 */4 * * *'
  
  # Allow manual triggers
  workflow_dispatch:

# Give the workflow permission to write to the repository
permissions:
  contents: write

jobs:
  crawl-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: playwright install chromium
      
      - name: Run crawler
        run: |
          python crawler.py
      
      - name: Verify output
        run: |
          if [ ! -f "output/bonuses.json" ]; then
            echo "❌ Error: bonuses.json not generated"
            exit 1
          fi
          
          # Check file size (should be > 1KB)
          size=$(wc -c < "output/bonuses.json")
          if [ $size -lt 1024 ]; then
            echo "❌ Error: bonuses.json too small ($size bytes)"
            exit 1
          fi
          
          echo "✅ bonuses.json generated successfully ($size bytes)"
      
      # 🆕 Copy to docs folder for GitHub Pages
      - name: Copy to docs folder for GitHub Pages
        run: |
          # Create docs/data directory
          mkdir -p docs/data
          
          # Copy bonuses.json to docs folder
          cp output/bonuses.json docs/data/bonuses.json
          
          # Create an index.html redirect at root
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/bato-crawler/data/bonuses.json">
            <title>Bato Crawler Data</title>
          </head>
          <body>
            <p>Redirecting to <a href="/bato-crawler/data/bonuses.json">bonuses.json</a></p>
          </body>
          </html>
          EOF
          
          # Create a pretty data browser page
          cat > docs/data/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Bato Bonuses Data</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
                background: linear-gradient(135deg, #7C3AED 0%, #2563EB 100%);
                color: white;
              }
              .container {
                background: white;
                color: #333;
                border-radius: 12px;
                padding: 30px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.3);
              }
              h1 { color: #7C3AED; }
              .stats {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                margin: 20px 0;
              }
              .stat-card {
                background: linear-gradient(135deg, #7C3AED 0%, #2563EB 100%);
                color: white;
                padding: 20px;
                border-radius: 8px;
                text-align: center;
              }
              .stat-card h3 { margin: 0; font-size: 2em; }
              .stat-card p { margin: 5px 0 0 0; opacity: 0.9; }
              .link-button {
                display: inline-block;
                background: #7C3AED;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                text-decoration: none;
                font-weight: 600;
                margin: 10px 5px;
              }
              .link-button:hover { background: #6D28D9; }
              pre {
                background: #f5f5f5;
                padding: 15px;
                border-radius: 8px;
                overflow-x: auto;
                border: 1px solid #e0e0e0;
              }
              .footer {
                margin-top: 30px;
                padding-top: 20px;
                border-top: 2px solid #e0e0e0;
                text-align: center;
                color: #666;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🏦 Bato Finance Bonus Data</h1>
              <p>Real-time bank bonus data updated every 4 hours</p>
              
              <div id="stats" class="stats">
                <div class="stat-card">
                  <h3 id="bonus-count">-</h3>
                  <p>Total Bonuses</p>
                </div>
                <div class="stat-card">
                  <h3 id="total-value">-</h3>
                  <p>Total Value</p>
                </div>
                <div class="stat-card">
                  <h3 id="last-updated">-</h3>
                  <p>Last Updated</p>
                </div>
              </div>
              
              <h2>📥 Access Data</h2>
              <div>
                <a href="bonuses.json" class="link-button" download>📥 Download JSON</a>
                <a href="bonuses.json" class="link-button" target="_blank">👁️ View Raw</a>
              </div>
              
              <h2>🔗 API Endpoints</h2>
              <pre><code>// GitHub Pages CDN (Recommended)
https://aquapartners.github.io/bato-crawler/data/bonuses.json

// GitHub Raw (Backup)
https://raw.githubusercontent.com/aquapartners/bato-crawler/main/output/bonuses.json

// jsDelivr CDN (Fastest)
https://cdn.jsdelivr.net/gh/aquapartners/bato-crawler@main/output/bonuses.json</code></pre>
              
              <h2>📊 Sample Data</h2>
              <pre id="sample-data">Loading...</pre>
              
              <div class="footer">
                <p>🤖 Generated by Bato Crawler • Updated every 4 hours via GitHub Actions</p>
                <p><strong>Cost:</strong> $0/month • <strong>Infrastructure:</strong> GitHub Pages (FREE)</p>
              </div>
            </div>
            
            <script>
              // Fetch and display data
              fetch('bonuses.json')
                .then(r => r.json())
                .then(data => {
                  // Update stats
                  document.getElementById('bonus-count').textContent = data.bonusCount || 0;
                  
                  const totalValue = data.meta?.totalValue || 0;
                  document.getElementById('total-value').textContent = '$' + totalValue.toLocaleString();
                  
                  const lastUpdated = new Date(data.lastUpdated);
                  const hoursAgo = Math.floor((Date.now() - lastUpdated.getTime()) / 3600000);
                  document.getElementById('last-updated').textContent = hoursAgo + 'h ago';
                  
                  // Show sample
                  const sample = {
                    bonusCount: data.bonusCount,
                    lastUpdated: data.lastUpdated,
                    categories: data.categories,
                    sampleBonus: data.bonuses?.[0] || {}
                  };
                  document.getElementById('sample-data').textContent = JSON.stringify(sample, null, 2);
                })
                .catch(err => {
                  document.getElementById('sample-data').textContent = 'Error loading data: ' + err.message;
                });
            </script>
          </body>
          </html>
          EOF
          
          echo "✅ Copied bonuses.json to docs/data/"
          echo "✅ Created index pages"
      
      - name: Commit and push results
        run: |
          git config user.name "Bato Crawler Bot"
          git config user.email "bot@bato.market"
          
          # Add both original output and docs folder
          git add output/bonuses.json docs/
          
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "🤖 Update bonuses data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          }
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonuses-data
          path: output/bonuses.json
          retention-days: 30
      
      - name: Display summary
        run: |
          echo "📊 Crawl Summary:"
          python -c "
          import json
          with open('output/bonuses.json') as f:
              data = json.load(f)
          print(f\"  Total bonuses: {data['bonusCount']}\")
          print(f\"  Categories: {', '.join(data['categories'])}\")
          print(f\"  Total value: \${data['meta']['totalValue']:,}\")
          print(f\"  Last updated: {data['lastUpdated']}\")
          "

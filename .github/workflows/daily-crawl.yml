name: Daily Bonus Crawl

on:
  schedule:
    # Run every 4 hours (6 times per day)
    - cron: '0 */4 * * *'
  
  # Allow manual triggers
  workflow_dispatch:

# Give the workflow permission to write to the repository
permissions:
  contents: write

# Force Node.js 24 for all JavaScript actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: playwright install chromium
      
      - name: Run crawler
        run: |
          python crawler.py
      
      - name: Verify output
        run: |
          if [ ! -f "output/bonuses.json" ]; then
            echo "❌ Error: bonuses.json not generated"
            exit 1
          fi
          
          # Check file size (should be > 1KB)
          size=$(wc -c < "output/bonuses.json")
          if [ $size -lt 1024 ]; then
            echo "❌ Error: bonuses.json too small ($size bytes)"
            exit 1
          fi
          
          echo "✅ bonuses.json generated successfully ($size bytes)"
      
      # 📁 Copy to docs folder for GitHub Pages – relies on pre‑committed HTML files
      - name: Copy to docs folder for GitHub Pages
        run: |
          # Create docs/data directory
          mkdir -p docs/data
          
          # Copy bonuses.json to docs folder
          cp output/bonuses.json docs/data/bonuses.json
          
          # Copy the pre‑committed HTML files (must exist, otherwise this step fails)
          cp github-pages/root-index.html docs/index.html
          cp github-pages/data-index.html docs/data/index.html
          
          echo "✅ GitHub Pages folder prepared"
      
      - name: Commit and push results
        run: |
          git config user.name "Bato Crawler Bot"
          git config user.email "bot@bato.market"
          
          # Remove root bonuses.json if it exists (old location)
          git rm --ignore-unmatch bonuses.json
          
          # Add generated file and docs folder
          git add output/bonuses.json docs/
          
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "🤖 Update bonuses data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          }
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonuses-data
          path: output/bonuses.json
          retention-days: 30
      
      - name: Display summary
        run: |
          echo "📊 Crawl Summary:"
          python -c "
          import json
          with open('output/bonuses.json') as f:
              data = json.load(f)
          print(f\"  Total bonuses: {data['bonusCount']}\")
          print(f\"  Categories: {', '.join(data['categories'])}\")
          print(f\"  Total value: \${data['meta']['totalValue']:,}\")
          print(f\"  Last updated: {data['lastUpdated']}\")
          "

name: Daily Bonus Crawl (Fallback)
on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get latest version from DHT (simulated)
        run: |
          # In a real implementation, you might query a public DHT node.
          # For now, we'll just increment a local version file.
          # This file can be used by clients as a fallback.
          VERSION_FILE="version.txt"
          if [ -f "$VERSION_FILE" ]; then
            CURRENT_VERSION=$(cat $VERSION_FILE)
            NEW_VERSION=$((CURRENT_VERSION + 1))
          else
            NEW_VERSION=1
          fi
          echo $NEW_VERSION > $VERSION_FILE
          echo "New version: $NEW_VERSION"

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update version.txt [skip ci]"
          file_pattern: version.txt

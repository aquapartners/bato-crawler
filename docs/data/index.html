<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bato Finance – Bonus Dashboard</title>
  <style>
    /* ===== DESIGN TOKENS (from style guide) ===== */
    :root {
      --purple-start: #7C3AED;
      --purple-mid: #8B5CF6;
      --blue-mid: #3B82F6;
      --blue-end: #2563EB;
      --navy: #0B1E33;
      --gold: #FFD700;
      --teal: #2A9D8F;
      --white: #FFFFFF;
      --red: #DC2626;
      --green: #10B981;
      --border-default: #e5e7eb;
      --border-focus: #7C3AED;
      --border-color: #c9ced5;
      --bg-gray-50: #f9fafb;
      --bg-gray-100: #f3f4f6;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --shadow-standard: 0 4px 12px rgba(204, 204, 204, 0.6), 0 12px 24px rgba(204, 204, 204, 0.4);
      --shadow-hover: 0 6px 16px rgba(204, 204, 204, 0.7), 0 14px 28px rgba(204, 204, 204, 0.5);
      --shadow-subtle: 0 2px 8px rgba(204, 204, 204, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-gray-50);
      color: var(--text-primary);
      line-height: 1.5;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ===== SHADOW UTILITIES ===== */
    .shadow-card {
      box-shadow: var(--shadow-standard);
      transition: box-shadow 0.2s ease;
    }
    .shadow-card:hover {
      box-shadow: var(--shadow-hover);
    }
    .shadow-subtle {
      box-shadow: var(--shadow-subtle);
    }

    /* ===== GRADIENT BACKGROUNDS ===== */
    .gradient-primary {
      background: linear-gradient(135deg, var(--purple-start), var(--blue-end));
    }
    .gradient-subtle {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.05), rgba(37, 99, 235, 0.05));
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--purple-start), var(--blue-end));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* ===== BORDERS & RADIUS ===== */
    .rounded-xl {
      border-radius: 12px;
    }
    .rounded-2xl {
      border-radius: 16px;
    }
    .rounded-lg {
      border-radius: 8px;
    }
    .rounded-full {
      border-radius: 9999px;
    }
    .border-default {
      border: 1px solid var(--border-default);
    }
    .border-color {
      border: 1px solid var(--border-color);
    }
    .border-focus {
      border: 2px solid var(--border-focus);
    }

    /* ===== TYPOGRAPHY ===== */
    h1, h2, h3 { font-weight: 700; }
    .text-xs { font-size: 0.75rem; }
    .text-sm { font-size: 0.875rem; }
    .text-base { font-size: 1rem; }
    .text-lg { font-size: 1.125rem; }
    .text-xl { font-size: 1.25rem; }
    .text-2xl { font-size: 1.5rem; }
    .text-3xl { font-size: 1.875rem; }
    .text-4xl { font-size: 2.25rem; }
    .font-normal { font-weight: 400; }
    .font-medium { font-weight: 500; }
    .font-semibold { font-weight: 600; }
    .font-bold { font-weight: 700; }
    .text-primary { color: var(--text-primary); }
    .text-secondary { color: var(--text-secondary); }
    .text-tertiary { color: var(--text-tertiary); }
    .text-white { color: var(--white); }

    /* ===== SPACING ===== */
    .p-2 { padding: 0.5rem; }
    .p-4 { padding: 1rem; }
    .p-6 { padding: 1.5rem; }
    .p-8 { padding: 2rem; }
    .px-2 { padding-left: 0.5rem; padding-right: 0.5rem; }
    .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
    .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-3 { margin-top: 0.75rem; }
    .mt-4 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 0.25rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mb-6 { margin-bottom: 1.5rem; }
    .mr-2 { margin-right: 0.5rem; }
    .space-y-4 > * + * { margin-top: 1rem; }
    .space-y-6 > * + * { margin-top: 1.5rem; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 0.75rem; }
    .gap-4 { gap: 1rem; }
    .gap-6 { gap: 1.5rem; }

    /* ===== FLEX & GRID ===== */
    .flex { display: flex; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .grid { display: grid; }
    .grid-cols-1 { grid-template-columns: repeat(1, 1fr); }
    .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
    @media (min-width: 768px) {
      .md\:grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
      .md\:grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
    }
    @media (min-width: 1024px) {
      .lg\:grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
    }

    /* ===== BUTTONS ===== */
    .btn-primary {
      background: linear-gradient(135deg, var(--purple-start), var(--blue-end));
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-subtle);
    }
    .btn-primary:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      border: 1px solid var(--border-default);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.3);
    }
    .btn-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 9999px;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .btn-icon:hover {
      background: var(--bg-gray-100);
      color: var(--text-primary);
    }

    /* ===== TAGS / BADGES ===== */
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-easy { background: #d1fae5; color: #065f46; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-hard { background: #fee2e2; color: #991b1b; }
    .badge-active { background: #dbeafe; color: #1e40af; }
    .badge-warning { background: #ffedd5; color: #9a3412; }

    /* ===== CAPITAL NEEDED BOX ===== */
    .capital-box {
      background: #e2e2ff;
      border: 1px solid #a78bfa;
      border-radius: 8px;
      padding: 0.5rem;
      margin-top: 0.75rem;
    }
    .capital-box .label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6565d2;
      margin-bottom: 0.125rem;
    }
    .capital-box .value {
      font-size: 1.25rem;
      font-weight: 700;
      color: #4343c8;
    }

    /* ===== LOADING SPINNER ===== */
    .spinner {
      border: 3px solid var(--bg-gray-100);
      border-top: 3px solid var(--purple-start);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* ===== BONUS CARD ===== */
    .bonus-card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: var(--shadow-standard);
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .bonus-card:hover {
      box-shadow: var(--shadow-hover);
      border-color: var(--border-focus);
    }
    .bonus-amount {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--purple-start), var(--blue-end));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .bonus-bank {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ===== TEST PAGE STYLES (unchanged) ===== */
    .test-panel { /* ... as before ... */ }

    /* ===== GITHUB CONFIG CARD ===== */
    .github-config {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: var(--shadow-standard);
      margin-top: 2rem;
    }
    .config-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .config-label {
      width: 120px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .config-input {
      flex: 1;
      min-width: 250px;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border-default);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .config-input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-valid {
      background: #d1fae5;
      color: #065f46;
    }
    .status-invalid {
      background: #fee2e2;
      color: #991b1b;
    }
    .status-unknown {
      background: #f3f4f6;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container" id="mainContainer"></div>

  <script>
    (function() {
      // ========== ERROR MONITOR (from previous version) ==========
      const errorMonitor = (function() {
        // ... (same as before, unchanged) ...
        // For brevity, we'll keep the same errorMonitor code from the previous answer.
        // I'm omitting it here to keep the response manageable, but it should be included.
        // In practice, you'd copy the full errorMonitor code from the previous answer.
      })();

      // ========== GITHUB CONFIGURATION HELPERS ==========
      const GITHUB_STORAGE_KEY = 'bato_github_config';

      function loadGitHubConfig() {
        try {
          const saved = localStorage.getItem(GITHUB_STORAGE_KEY);
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return {
          token: '',
          repo: 'aquapartners/bato-crawler',
          workflowFile: 'crawl.yml',
          lastValidated: null,
          isValid: false
        };
      }

      function saveGitHubConfig(config) {
        localStorage.setItem(GITHUB_STORAGE_KEY, JSON.stringify(config));
      }

      async function validateGitHubToken(token, repo, workflowFile) {
        if (!token) return { valid: false, message: 'No token provided' };
        try {
          // Test token by fetching user info
          const userResp = await fetch('https://api.github.com/user', {
            headers: { 'Authorization': `token ${token}` }
          });
          if (!userResp.ok) {
            const err = await userResp.json();
            return { valid: false, message: err.message || 'Invalid token' };
          }
          const user = await userResp.json();

          // Check repo access
          const repoResp = await fetch(`https://api.github.com/repos/${repo}`, {
            headers: { 'Authorization': `token ${token}` }
          });
          if (!repoResp.ok) {
            return { valid: false, message: `Cannot access repository: ${repo}` };
          }

          // Check workflow file exists
          const workflowResp = await fetch(`https://api.github.com/repos/${repo}/contents/.github/workflows/${workflowFile}`, {
            headers: { 'Authorization': `token ${token}` }
          });
          if (!workflowResp.ok) {
            return { valid: false, message: `Workflow file not found: .github/workflows/${workflowFile}` };
          }

          return {
            valid: true,
            message: `Token valid for ${user.login} – workflow file exists`
          };
        } catch (err) {
          return { valid: false, message: err.message };
        }
      }

      // ========== URL PARAM DETECTION ==========
      const urlParams = new URLSearchParams(window.location.search);
      const isTestMode = urlParams.get('test') === 'errors';

      // ========== RENDER DASHBOARD (normal mode) ==========
      function renderDashboard() {
        const container = document.getElementById('mainContainer');
        // ... (the full dashboard HTML as before) ...
        // For brevity, I'm including only the new GitHub config card and the footer.
        // In practice, you'd paste the entire dashboard HTML from the previous answer here.
        // I'll show the new part at the end.

        // Let's assume we have the same dashboard HTML as before, and we append the GitHub config after the footer.
        // We'll construct the full HTML string.

        const dashboardHTML = `
          <!-- ===== HEADER WITH GRADIENT ===== -->
          <div class="gradient-primary rounded-2xl p-6 text-white shadow-card mb-6">
            <div class="flex items-center justify-between flex-wrap gap-4">
              <div>
                <h1 class="text-3xl font-bold flex items-center gap-2">
                  <span>🏦</span> Bato Bonus Dashboard
                </h1>
                <p class="text-purple-100 text-sm mt-1">
                  Real‑time bank bonuses • Updated every 4 hours
                </p>
              </div>
              <div class="flex gap-2">
                <button class="btn-secondary text-white" id="refreshBtn">⟳ Refresh</button>
              </div>
            </div>
            <!-- Stats Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
              <div class="bg-white/10 backdrop-blur rounded-lg p-3 text-center">
                <div class="text-2xl font-bold" id="statBonuses">-</div>
                <div class="text-xs text-purple-100">Total Bonuses</div>
              </div>
              <div class="bg-white/10 backdrop-blur rounded-lg p-3 text-center">
                <div class="text-2xl font-bold" id="statValue">-</div>
                <div class="text-xs text-purple-100">Total Value</div>
              </div>
              <div class="bg-white/10 backdrop-blur rounded-lg p-3 text-center">
                <div class="text-2xl font-bold" id="statCategories">-</div>
                <div class="text-xs text-purple-100">Categories</div>
              </div>
              <div class="bg-white/10 backdrop-blur rounded-lg p-3 text-center">
                <div class="text-2xl font-bold" id="statAvg">-</div>
                <div class="text-xs text-purple-100">Avg Bonus</div>
              </div>
            </div>
          </div>

          <!-- ===== FILTER PANEL ===== -->
          <div class="bg-white rounded-2xl p-4 shadow-card mb-6">
            <div class="flex flex-wrap items-center justify-between gap-4">
              <div class="flex flex-wrap gap-2">
                <span class="text-sm text-secondary font-medium mr-2">Category:</span>
                <div id="categoryFilters" class="flex flex-wrap gap-2"></div>
              </div>
              <div class="flex gap-2">
                <select id="sortSelect" class="border border-default rounded-lg px-3 py-2 text-sm focus:border-focus focus:ring-2 focus:ring-purple-200 outline-none">
                  <option value="amountDesc">💰 Bonus (high to low)</option>
                  <option value="amountAsc">💰 Bonus (low to high)</option>
                  <option value="bank">🏛️ Bank name</option>
                  <option value="difficulty">🎯 Difficulty</option>
                </select>
              </div>
            </div>
          </div>

          <!-- ===== BONUS GRID / LOADING / ERROR ===== -->
          <div id="contentArea">
            <div class="flex justify-center py-12" id="loading">
              <div class="spinner"></div>
            </div>
            <div id="error" class="hidden">
              <div class="bg-red-50 border-2 border-red-200 rounded-xl p-6 text-center">
                <div class="text-5xl mb-3">😵</div>
                <h3 class="text-xl font-bold text-red-800 mb-2">Failed to load bonuses</h3>
                <p class="text-red-700 mb-4">The data could not be fetched. Please try again later.</p>
                <button class="btn-primary" onclick="location.reload()">Retry</button>
              </div>
            </div>
            <div id="bonusGrid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
          </div>

          <!-- ===== GITHUB CONFIGURATION CARD ===== -->
          <div class="github-config">
            <h2 class="text-xl font-bold gradient-text mb-4">⚙️ GitHub Crawler Configuration</h2>
            <p class="text-sm text-secondary mb-4">
              Configure a GitHub Personal Access Token to automatically trigger the Python crawler every 15 minutes.
              The token is stored only in your browser's localStorage.
            </p>

            <div class="config-row">
              <span class="config-label">GitHub Token</span>
              <input type="password" id="githubToken" class="config-input" placeholder="ghp_xxxxxxxxxxxx" value="">
              <button class="btn-secondary" id="showHideToken">Show</button>
            </div>

            <div class="config-row">
              <span class="config-label">Repository</span>
              <input type="text" id="githubRepo" class="config-input" placeholder="owner/repo" value="aquapartners/bato-crawler">
            </div>

            <div class="config-row">
              <span class="config-label">Workflow File</span>
              <input type="text" id="githubWorkflow" class="config-input" placeholder="crawl.yml" value="crawl.yml">
            </div>

            <div class="config-row">
              <span class="config-label">Status</span>
              <span id="tokenStatus" class="status-badge status-unknown">Not validated</span>
              <button class="btn-primary" id="validateTokenBtn">Validate Token</button>
              <button class="btn-secondary" id="saveConfigBtn">Save Configuration</button>
            </div>

            <div class="text-xs text-tertiary mt-3" id="lastTriggerInfo">
              Last trigger: never
            </div>
          </div>

          <!-- ===== FOOTER ===== -->
          <div class="mt-8 text-center text-tertiary text-sm border-t border-default pt-6">
            <p>🤖 Generated by <strong>Bato Crawler</strong> • Data served via GitHub Pages • <span id="lastUpdated"></span></p>
          </div>
        `;

        container.innerHTML = dashboardHTML;

        // Load config into inputs
        const config = loadGitHubConfig();
        const tokenInput = document.getElementById('githubToken');
        const repoInput = document.getElementById('githubRepo');
        const workflowInput = document.getElementById('githubWorkflow');
        const tokenStatus = document.getElementById('tokenStatus');
        const lastTriggerInfo = document.getElementById('lastTriggerInfo');

        tokenInput.value = config.token || '';
        repoInput.value = config.repo || 'aquapartners/bato-crawler';
        workflowInput.value = config.workflowFile || 'crawl.yml';

        if (config.isValid && config.lastValidated) {
          tokenStatus.textContent = '✓ Valid (last check: ' + new Date(config.lastValidated).toLocaleString() + ')';
          tokenStatus.className = 'status-badge status-valid';
        } else {
          tokenStatus.textContent = 'Not validated';
          tokenStatus.className = 'status-badge status-unknown';
        }

        // Show/hide token
        document.getElementById('showHideToken').addEventListener('click', (e) => {
          if (tokenInput.type === 'password') {
            tokenInput.type = 'text';
            e.target.textContent = 'Hide';
          } else {
            tokenInput.type = 'password';
            e.target.textContent = 'Show';
          }
        });

        // Validate token
        document.getElementById('validateTokenBtn').addEventListener('click', async () => {
          const token = tokenInput.value.trim();
          const repo = repoInput.value.trim();
          const workflow = workflowInput.value.trim();

          if (!token) {
            tokenStatus.textContent = 'No token entered';
            tokenStatus.className = 'status-badge status-invalid';
            return;
          }

          tokenStatus.textContent = 'Validating...';
          tokenStatus.className = 'status-badge status-unknown';

          const result = await validateGitHubToken(token, repo, workflow);
          if (result.valid) {
            tokenStatus.textContent = '✓ ' + result.message;
            tokenStatus.className = 'status-badge status-valid';
            config.token = token;
            config.repo = repo;
            config.workflowFile = workflow;
            config.isValid = true;
            config.lastValidated = Date.now();
            saveGitHubConfig(config);
          } else {
            tokenStatus.textContent = '✗ ' + result.message;
            tokenStatus.className = 'status-badge status-invalid';
          }
        });

        // Save configuration (without validation)
        document.getElementById('saveConfigBtn').addEventListener('click', () => {
          config.token = tokenInput.value.trim();
          config.repo = repoInput.value.trim();
          config.workflowFile = workflowInput.value.trim();
          config.isValid = false; // mark as not validated until next validation
          config.lastValidated = null;
          saveGitHubConfig(config);
          tokenStatus.textContent = 'Configuration saved (not validated)';
          tokenStatus.className = 'status-badge status-unknown';
        });

        // Load last trigger time from localStorage (set by React app)
        const lastTrigger = localStorage.getItem('bato_last_github_trigger');
        if (lastTrigger) {
          lastTriggerInfo.textContent = 'Last trigger: ' + new Date(parseInt(lastTrigger)).toLocaleString();
        }

        // ===== DASHBOARD FUNCTIONALITY (same as before) =====
        const CDN_URL = './bonuses.json';
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const gridEl = document.getElementById('bonusGrid');
        const categoryFiltersEl = document.getElementById('categoryFilters');
        const sortSelect = document.getElementById('sortSelect');
        const statBonuses = document.getElementById('statBonuses');
        const statValue = document.getElementById('statValue');
        const statCategories = document.getElementById('statCategories');
        const statAvg = document.getElementById('statAvg');
        const lastUpdatedSpan = document.getElementById('lastUpdated');
        const refreshBtn = document.getElementById('refreshBtn');

        let allBonuses = [];
        let filteredBonuses = [];
        let categories = new Set();
        let activeCategory = 'all';

        async function fetchData() {
          try {
            const resp = await fetch(CDN_URL);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            allBonuses = data.bonuses || [];
            renderStats(data);
            extractCategories(allBonuses);
            applyFiltersAndSort();
            loadingEl.classList.add('hidden');
            gridEl.classList.remove('hidden');
          } catch (err) {
            errorMonitor.logNetworkError('Failed to load bonus data', { url: CDN_URL, error: err.message });
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
          }
        }

        function renderStats(data) {
          const count = data.bonusCount || allBonuses.length;
          statBonuses.textContent = count.toLocaleString();
          const total = data.meta?.totalValue || allBonuses.reduce((sum, b) => sum + (b.bonusAmount || 0), 0);
          statValue.textContent = '$' + total.toLocaleString();
          const cats = new Set(allBonuses.map(b => b.category).filter(Boolean));
          statCategories.textContent = cats.size;
          const avg = count ? Math.round(total / count) : 0;
          statAvg.textContent = '$' + avg.toLocaleString();
          lastUpdatedSpan.textContent = data.lastUpdated ? `Last updated: ${new Date(data.lastUpdated).toLocaleString()}` : '';
        }

        function extractCategories(bonuses) {
          categories.clear();
          bonuses.forEach(b => { if (b.category) categories.add(b.category); });
          renderCategoryFilters();
        }

        function renderCategoryFilters() {
          const html = ['<button class="badge" data-category="all" style="background:#7C3AED; color:white;">All</button>'];
          categories.forEach(cat => {
            html.push(`<button class="badge bg-gray-100 text-gray-700 hover:bg-purple-100" data-category="${cat}">${cat}</button>`);
          });
          categoryFiltersEl.innerHTML = html.join('');
          document.querySelectorAll('[data-category]').forEach(btn => {
            btn.addEventListener('click', (e) => {
              document.querySelectorAll('[data-category]').forEach(b => {
                b.classList.remove('bg-purple-600', 'text-white');
                b.classList.add('bg-gray-100', 'text-gray-700');
              });
              e.target.classList.remove('bg-gray-100', 'text-gray-700');
              e.target.classList.add('bg-purple-600', 'text-white');
              activeCategory = e.target.dataset.category;
              applyFiltersAndSort();
            });
          });
        }

        function applyFiltersAndSort() {
          filteredBonuses = allBonuses.filter(b => activeCategory === 'all' || b.category === activeCategory);
          sortBonuses();
          renderGrid();
        }

        function sortBonuses() {
          const sortBy = sortSelect.value;
          filteredBonuses.sort((a, b) => {
            if (sortBy === 'amountDesc') return (b.bonusAmount || 0) - (a.bonusAmount || 0);
            if (sortBy === 'amountAsc') return (a.bonusAmount || 0) - (b.bonusAmount || 0);
            if (sortBy === 'bank') return (a.bank || '').localeCompare(b.bank || '');
            if (sortBy === 'difficulty') return (a.difficulty || 5) - (b.difficulty || 5);
            return 0;
          });
        }

        function renderGrid() {
          if (!filteredBonuses.length) {
            gridEl.innerHTML = `
              <div class="col-span-full text-center py-12">
                <div class="text-5xl mb-3">🔍</div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">No bonuses found</h3>
                <p class="text-gray-600">Try adjusting your filters</p>
              </div>
            `;
            return;
          }

          let html = '';
          filteredBonuses.forEach(b => {
            const difficultyClass = b.difficulty <= 2 ? 'badge-easy' : b.difficulty <= 4 ? 'badge-medium' : 'badge-hard';
            const difficultyLabel = b.difficulty <= 2 ? 'easy' : b.difficulty <= 4 ? 'medium' : 'hard';
            const capital = b.capitalRequired || b.min_deposit || 0;
            const capitalDisplay = capital ? `$${capital.toLocaleString()}` : 'None';
            const tags = b.tags || [];
            const tagHtml = tags.slice(0, 3).map(t => `<span class="badge bg-gray-100 text-gray-600">${t}</span>`).join('');

            html += `
              <div class="bonus-card">
                <div class="flex justify-between items-start mb-2">
                  <span class="badge ${difficultyClass}">${difficultyLabel}</span>
                  <span class="badge bg-blue-100 text-blue-700">${b.category || 'bank'}</span>
                </div>
                <div class="bonus-amount">$${b.bonusAmount?.toLocaleString()}</div>
                <div class="bonus-bank mt-1">${b.bank || b.platform || 'Unknown'}</div>
                <p class="text-sm text-secondary mt-2 line-clamp-2" title="${b.requirements || ''}">
                  ${b.requirements || 'No requirements listed'}
                </p>
                ${capital ? `
                  <div class="capital-box">
                    <div class="label">Capital Needed</div>
                    <div class="value">$${capital.toLocaleString()}</div>
                  </div>
                ` : ''}
                <div class="flex flex-wrap gap-1 mt-3">${tagHtml}</div>
                ${b.expiryDate ? `
                  <div class="text-xs text-red-600 mt-2 flex items-center gap-1">
                    <span>⏳</span> Expires ${new Date(b.expiryDate).toLocaleDateString()}
                  </div>
                ` : ''}
              </div>
            `;
          });
          gridEl.innerHTML = html;
        }

        refreshBtn.addEventListener('click', () => location.reload());
        sortSelect.addEventListener('change', applyFiltersAndSort);
        fetchData();
      }

      // ========== RENDER TEST PAGE (unchanged) ==========
      function renderTestPage() {
        // ... (keep the full test page code from previous answer) ...
        // For brevity, I'm not repeating it here.
        // In practice, you'd include the entire test page code.
      }

      // ========== RENDER BASED ON MODE ==========
      if (isTestMode) {
        renderTestPage();
      } else {
        renderDashboard();
      }
    })();
  </script>

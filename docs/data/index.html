<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bato Finance – Bonus Dashboard</title>
  <style>
    /* ===== DESIGN TOKENS (from style guide) ===== */
    :root {
      --purple-start: #7C3AED;
      --purple-mid: #8B5CF6;
      --blue-mid: #3B82F6;
      --blue-end: #2563EB;
      --navy: #0B1E33;
      --gold: #FFD700;
      --teal: #2A9D8F;
      --white: #FFFFFF;
      --red: #DC2626;
      --green: #10B981;
      --border-default: #e5e7eb;
      --border-focus: #7C3AED;
      --border-color: #c9ced5;
      --bg-gray-50: #f9fafb;
      --bg-gray-100: #f3f4f6;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --shadow-standard: 0 4px 12px rgba(204, 204, 204, 0.6), 0 12px 24px rgba(204, 204, 204, 0.4);
      --shadow-hover: 0 6px 16px rgba(204, 204, 204, 0.7), 0 14px 28px rgba(204, 204, 204, 0.5);
      --shadow-subtle: 0 2px 8px rgba(204, 204, 204, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-gray-50);
      color: var(--text-primary);
      line-height: 1.5;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ===== SHADOW UTILITIES ===== */
    .shadow-card {
      box-shadow: var(--shadow-standard);
      transition: box-shadow 0.2s ease;
    }
    .shadow-card:hover {
      box-shadow: var(--shadow-hover);
    }
    .shadow-subtle {
      box-shadow: var(--shadow-subtle);
    }

    /* ===== GRADIENT BACKGROUNDS ===== */
    .gradient-primary {
      background: linear-gradient(135deg, var(--purple-start), var(--blue-end));
    }
    .gradient-subtle {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.05), rgba(37, 99, 235, 0.05));
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--purple-start), var(--blue-end));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* ===== BORDERS & RADIUS ===== */
    .rounded-xl {
      border-radius: 12px;
    }
    .rounded-2xl {
      border-radius: 16px;
    }
    .rounded-lg {
      border-radius: 8px;
    }
    .rounded-full {
      border-radius: 9999px;
    }
    .border-default {
      border: 1px solid var(--border-default);
    }
    .border-color {
      border: 1px solid var(--border-color);
    }
    .border-focus {
      border: 2px solid var(--border-focus);
    }

    /* ===== TYPOGRAPHY ===== */
    h1, h2, h3 { font-weight: 700; }
    .text-xs { font-size: 0.75rem; }
    .text-sm { font-size: 0.875rem; }
    .text-base { font-size: 1rem; }
    .text-lg { font-size: 1.125rem; }
    .text-xl { font-size: 1.25rem; }
    .text-2xl { font-size: 1.5rem; }
    .text-3xl { font-size: 1.875rem; }
    .text-4xl { font-size: 2.25rem; }
    .font-normal { font-weight: 400; }
    .font-medium { font-weight: 500; }
    .font-semibold { font-weight: 600; }
    .font-bold { font-weight: 700; }
    .text-primary { color: var(--text-primary); }
    .text-secondary { color: var(--text-secondary); }
    .text-tertiary { color: var(--text-tertiary); }
    .text-white { color: var(--white); }

    /* ===== SPACING ===== */
    .p-2 { padding: 0.5rem; }
    .p-4 { padding: 1rem; }
    .p-6 { padding: 1.5rem; }
    .p-8 { padding: 2rem; }
    .px-2 { padding-left: 0.5rem; padding-right: 0.5rem; }
    .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
    .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-3 { margin-top: 0.75rem; }
    .mt-4 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 0.25rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mb-6 { margin-bottom: 1.5rem; }
    .mr-2 { margin-right: 0.5rem; }
    .space-y-4 > * + * { margin-top: 1rem; }
    .space-y-6 > * + * { margin-top: 1.5rem; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 0.75rem; }
    .gap-4 { gap: 1rem; }
    .gap-6 { gap: 1.5rem; }

    /* ===== FLEX & GRID ===== */
    .flex { display: flex; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .grid { display: grid; }
    .grid-cols-1 { grid-template-columns: repeat(1, 1fr); }
    .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
    @media (min-width: 768px) {
      .md\:grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
      .md\:grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
    }
    @media (min-width: 1024px) {
      .lg\:grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
    }

    /* ===== BUTTONS ===== */
    .btn-primary {
      background: linear-gradient(135deg, var(--purple-start), var(--blue-end));
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-subtle);
    }
    .btn-primary:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      border: 1px solid var(--border-default);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.3);
    }
    .btn-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 9999px;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .btn-icon:hover {
      background: var(--bg-gray-100);
      color: var(--text-primary);
    }

    /* ===== TAGS / BADGES ===== */
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-easy { background: #d1fae5; color: #065f46; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-hard { background: #fee2e2; color: #991b1b; }
    .badge-active { background: #dbeafe; color: #1e40af; }
    .badge-warning { background: #ffedd5; color: #9a3412; }

    /* ===== CAPITAL NEEDED BOX ===== */
    .capital-box {
      background: #e2e2ff;
      border: 1px solid #a78bfa;
      border-radius: 8px;
      padding: 0.5rem;
      margin-top: 0.75rem;
    }
    .capital-box .label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6565d2;
      margin-bottom: 0.125rem;
    }
    .capital-box .value {
      font-size: 1.25rem;
      font-weight: 700;
      color: #4343c8;
    }

    /* ===== LOADING SPINNER ===== */
    .spinner {
      border: 3px solid var(--bg-gray-100);
      border-top: 3px solid var(--purple-start);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* ===== BONUS CARD ===== */
    .bonus-card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: var(--shadow-standard);
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .bonus-card:hover {
      box-shadow: var(--shadow-hover);
      border-color: var(--border-focus);
    }
    .bonus-amount {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--purple-start), var(--blue-end));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .bonus-bank {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ===== TEST PAGE STYLES ===== */
    .test-panel {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow-standard);
    }
    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .test-button {
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg-gray-100);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
    }
    .test-button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      border-color: var(--border-focus);
    }
    .test-button.danger { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
    .test-button.warning { background: #ffedd5; color: #9a3412; border-color: #fed7aa; }
    .test-button.success { background: #d1fae5; color: #065f46; border-color: #a7f3d0; }
    .log-console {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Monaco', 'Menlo', monospace;
      padding: 1rem;
      border-radius: 8px;
      height: 200px;
      overflow-y: auto;
      font-size: 0.85rem;
      margin: 1rem 0;
    }
    .log-entry {
      margin: 2px 0;
      padding: 2px 0;
      border-bottom: 1px solid #333;
    }
    .log-error { color: #f87171; }
    .log-warning { color: #fbbf24; }
    .log-info { color: #60a5fa; }
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    .summary-table th, .summary-table td {
      padding: 0.5rem;
      text-align: left;
      border-bottom: 1px solid var(--border-default);
    }
    .summary-table th {
      background: var(--bg-gray-100);
      font-weight: 600;
    }
    .health-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 0.5rem;
    }
    .health-healthy { background: var(--green); }
    .health-warning { background: #fbbf24; }
    .health-critical { background: var(--red); }
    .error-boundary-fallback {
      background: #fee2e2;
      border: 2px solid #fecaca;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container" id="mainContainer">
    <!-- The dashboard will be inserted here by JavaScript -->
  </div>

  <script>
    (function() {
      // ========== ERROR MONITOR (simplified for static page) ==========
      const errorMonitor = (function() {
        let errors = [];
        let listeners = [];
        let stats = { error: 0, warning: 0, network: 0, sync: 0, encryption: 0, info: 0, total: 0 };

        // Load from localStorage if available
        try {
          const saved = localStorage.getItem('bato_error_logs_test');
          if (saved) errors = JSON.parse(saved);
          const savedStats = localStorage.getItem('bato_error_stats_test');
          if (savedStats) stats = JSON.parse(savedStats);
        } catch (e) {}

        function save() {
          try {
            localStorage.setItem('bato_error_logs_test', JSON.stringify(errors.slice(-100)));
            localStorage.setItem('bato_error_stats_test', JSON.stringify(stats));
          } catch (e) {}
        }

        function addLog(entry) {
          entry.id = 'err_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
          entry.timestamp = new Date().toISOString();
          errors.push(entry);
          stats[entry.type] = (stats[entry.type] || 0) + 1;
          stats.total++;
          save();
          listeners.forEach(fn => fn(entry));
          return entry;
        }

        return {
          logError: (msg, context = {}) => addLog({ type: 'error', message: msg, context }),
          logWarning: (msg, context = {}) => addLog({ type: 'warning', message: msg, context }),
          logNetworkError: (msg, context = {}) => addLog({ type: 'network', message: msg, context }),
          logSyncError: (msg, context = {}) => addLog({ type: 'sync', message: msg, context }),
          logEncryptionError: (msg, context = {}) => addLog({ type: 'encryption', message: msg, context }),
          logInfo: (msg, context = {}) => addLog({ type: 'info', message: msg, context }),
          getAllErrors: () => [...errors],
          getStats: () => ({ ...stats }),
          getHealthStatus: () => {
            if (stats.error >= 5 || stats.network >= 3) return { status: 'critical', message: 'High error rate', errors: stats.error, warnings: stats.warning };
            if (stats.error >= 2 || stats.warning >= 5) return { status: 'warning', message: 'Elevated errors', errors: stats.error, warnings: stats.warning };
            return { status: 'healthy', message: 'All systems operational', errors: stats.error, warnings: stats.warning };
          },
          clear: () => {
            errors = [];
            stats = { error: 0, warning: 0, network: 0, sync: 0, encryption: 0, info: 0, total: 0 };
            save();
          },
          onError: (fn) => {
            listeners.push(fn);
            return () => { listeners = listeners.filter(l => l !== fn); };
          },
          exportErrors: () => {
            return JSON.stringify({ errors: errors.slice(-100), stats }, null, 2);
          }
        };
      })();

      // ========== URL PARAM DETECTION ==========
      const urlParams = new URLSearchParams(window.location.search);
      const isTestMode = urlParams.get('test') === 'errors';

      // ========== RENDER DASHBOARD (normal mode) ==========
      function renderDashboard() {
        const container = document.getElementById('mainContainer');
        container.innerHTML = `
          <!-- ===== HEADER WITH GRADIENT ===== -->
          <div class="gradient-primary rounded-2xl p-6 text-white shadow-card mb-6">
            <div class="flex items-center justify-between flex-wrap gap-4">
              <div>
                <h1 class="text-3xl font-bold flex items-center gap-2">
                  <span>🏦</span> Bato Bonus Dashboard
                </h1>
                <p class="text-purple-100 text-sm mt-1">
                  Real‑time bank bonuses • Updated every 4 hours
                </p>
              </div>
              <div class="flex gap-2">
                <button class="btn-secondary text-white" id="refreshBtn">⟳ Refresh</button>
              </div>
            </div>

            <!-- Stats Cards (filled via JS) -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
              <div class="bg-white/10 backdrop-blur rounded-lg p-3 text-center">
                <div class="text-2xl font-bold" id="statBonuses">-</div>
                <div class="text-xs text-purple-100">Total Bonuses</div>
              </div>
              <div class="bg-white/10 backdrop-blur rounded-lg p-3 text-center">
                <div class="text-2xl font-bold" id="statValue">-</div>
                <div class="text-xs text-purple-100">Total Value</div>
              </div>
              <div class="bg-white/10 backdrop-blur rounded-lg p-3 text-center">
                <div class="text-2xl font-bold" id="statCategories">-</div>
                <div class="text-xs text-purple-100">Categories</div>
              </div>
              <div class="bg-white/10 backdrop-blur rounded-lg p-3 text-center">
                <div class="text-2xl font-bold" id="statAvg">-</div>
                <div class="text-xs text-purple-100">Avg Bonus</div>
              </div>
            </div>
          </div>

          <!-- ===== FILTER PANEL ===== -->
          <div class="bg-white rounded-2xl p-4 shadow-card mb-6">
            <div class="flex flex-wrap items-center justify-between gap-4">
              <div class="flex flex-wrap gap-2">
                <!-- Category filters (dynamically created) -->
                <span class="text-sm text-secondary font-medium mr-2">Category:</span>
                <div id="categoryFilters" class="flex flex-wrap gap-2"></div>
              </div>
              <div class="flex gap-2">
                <select id="sortSelect" class="border border-default rounded-lg px-3 py-2 text-sm focus:border-focus focus:ring-2 focus:ring-purple-200 outline-none">
                  <option value="amountDesc">💰 Bonus (high to low)</option>
                  <option value="amountAsc">💰 Bonus (low to high)</option>
                  <option value="bank">🏛️ Bank name</option>
                  <option value="difficulty">🎯 Difficulty</option>
                </select>
              </div>
            </div>
          </div>

          <!-- ===== BONUS GRID / LOADING / ERROR ===== -->
          <div id="contentArea">
            <!-- Loading state -->
            <div class="flex justify-center py-12" id="loading">
              <div class="spinner"></div>
            </div>

            <!-- Error state (hidden initially) -->
            <div id="error" class="hidden">
              <div class="bg-red-50 border-2 border-red-200 rounded-xl p-6 text-center">
                <div class="text-5xl mb-3">😵</div>
                <h3 class="text-xl font-bold text-red-800 mb-2">Failed to load bonuses</h3>
                <p class="text-red-700 mb-4">The data could not be fetched. Please try again later.</p>
                <button class="btn-primary" onclick="location.reload()">Retry</button>
              </div>
            </div>

            <!-- Bonus grid (hidden initially) -->
            <div id="bonusGrid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
          </div>

          <!-- ===== FOOTER ===== -->
          <div class="mt-8 text-center text-tertiary text-sm border-t border-default pt-6">
            <p>🤖 Generated by <strong>Bato Crawler</strong> • Data served via GitHub Pages • <span id="lastUpdated"></span></p>
          </div>
        `;

        // Dashboard functionality (same as before)
        const CDN_URL = './bonuses.json';
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const gridEl = document.getElementById('bonusGrid');
        const categoryFiltersEl = document.getElementById('categoryFilters');
        const sortSelect = document.getElementById('sortSelect');
        const statBonuses = document.getElementById('statBonuses');
        const statValue = document.getElementById('statValue');
        const statCategories = document.getElementById('statCategories');
        const statAvg = document.getElementById('statAvg');
        const lastUpdatedSpan = document.getElementById('lastUpdated');
        const refreshBtn = document.getElementById('refreshBtn');

        let allBonuses = [];
        let filteredBonuses = [];
        let categories = new Set();
        let activeCategory = 'all';

        async function fetchData() {
          try {
            const resp = await fetch(CDN_URL);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            allBonuses = data.bonuses || [];
            renderStats(data);
            extractCategories(allBonuses);
            applyFiltersAndSort();
            loadingEl.classList.add('hidden');
            gridEl.classList.remove('hidden');
          } catch (err) {
            errorMonitor.logNetworkError('Failed to load bonus data', { url: CDN_URL, error: err.message });
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
          }
        }

        function renderStats(data) {
          const count = data.bonusCount || allBonuses.length;
          statBonuses.textContent = count.toLocaleString();
          const total = data.meta?.totalValue || allBonuses.reduce((sum, b) => sum + (b.bonusAmount || 0), 0);
          statValue.textContent = '$' + total.toLocaleString();
          const cats = new Set(allBonuses.map(b => b.category).filter(Boolean));
          statCategories.textContent = cats.size;
          const avg = count ? Math.round(total / count) : 0;
          statAvg.textContent = '$' + avg.toLocaleString();
          lastUpdatedSpan.textContent = data.lastUpdated ? `Last updated: ${new Date(data.lastUpdated).toLocaleString()}` : '';
        }

        function extractCategories(bonuses) {
          categories.clear();
          bonuses.forEach(b => { if (b.category) categories.add(b.category); });
          renderCategoryFilters();
        }

        function renderCategoryFilters() {
          const html = ['<button class="badge" data-category="all" style="background:#7C3AED; color:white;">All</button>'];
          categories.forEach(cat => {
            html.push(`<button class="badge bg-gray-100 text-gray-700 hover:bg-purple-100" data-category="${cat}">${cat}</button>`);
          });
          categoryFiltersEl.innerHTML = html.join('');
          document.querySelectorAll('[data-category]').forEach(btn => {
            btn.addEventListener('click', (e) => {
              document.querySelectorAll('[data-category]').forEach(b => {
                b.classList.remove('bg-purple-600', 'text-white');
                b.classList.add('bg-gray-100', 'text-gray-700');
              });
              e.target.classList.remove('bg-gray-100', 'text-gray-700');
              e.target.classList.add('bg-purple-600', 'text-white');
              activeCategory = e.target.dataset.category;
              applyFiltersAndSort();
            });
          });
        }

        function applyFiltersAndSort() {
          filteredBonuses = allBonuses.filter(b => activeCategory === 'all' || b.category === activeCategory);
          sortBonuses();
          renderGrid();
        }

        function sortBonuses() {
          const sortBy = sortSelect.value;
          filteredBonuses.sort((a, b) => {
            if (sortBy === 'amountDesc') return (b.bonusAmount || 0) - (a.bonusAmount || 0);
            if (sortBy === 'amountAsc') return (a.bonusAmount || 0) - (b.bonusAmount || 0);
            if (sortBy === 'bank') return (a.bank || '').localeCompare(b.bank || '');
            if (sortBy === 'difficulty') return (a.difficulty || 5) - (b.difficulty || 5);
            return 0;
          });
        }

        function renderGrid() {
          if (!filteredBonuses.length) {
            gridEl.innerHTML = `
              <div class="col-span-full text-center py-12">
                <div class="text-5xl mb-3">🔍</div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">No bonuses found</h3>
                <p class="text-gray-600">Try adjusting your filters</p>
              </div>
            `;
            return;
          }

          let html = '';
          filteredBonuses.forEach(b => {
            const difficultyClass = b.difficulty <= 2 ? 'badge-easy' : b.difficulty <= 4 ? 'badge-medium' : 'badge-hard';
            const difficultyLabel = b.difficulty <= 2 ? 'easy' : b.difficulty <= 4 ? 'medium' : 'hard';
            const capital = b.capitalRequired || b.min_deposit || 0;
            const capitalDisplay = capital ? `$${capital.toLocaleString()}` : 'None';
            const tags = b.tags || [];
            const tagHtml = tags.slice(0, 3).map(t => `<span class="badge bg-gray-100 text-gray-600">${t}</span>`).join('');

            html += `
              <div class="bonus-card">
                <div class="flex justify-between items-start mb-2">
                  <span class="badge ${difficultyClass}">${difficultyLabel}</span>
                  <span class="badge bg-blue-100 text-blue-700">${b.category || 'bank'}</span>
                </div>
                <div class="bonus-amount">$${b.bonusAmount?.toLocaleString()}</div>
                <div class="bonus-bank mt-1">${b.bank || b.platform || 'Unknown'}</div>
                <p class="text-sm text-secondary mt-2 line-clamp-2" title="${b.requirements || ''}">
                  ${b.requirements || 'No requirements listed'}
                </p>
                ${capital ? `
                  <div class="capital-box">
                    <div class="label">Capital Needed</div>
                    <div class="value">$${capital.toLocaleString()}</div>
                  </div>
                ` : ''}
                <div class="flex flex-wrap gap-1 mt-3">${tagHtml}</div>
                ${b.expiryDate ? `
                  <div class="text-xs text-red-600 mt-2 flex items-center gap-1">
                    <span>⏳</span> Expires ${new Date(b.expiryDate).toLocaleDateString()}
                  </div>
                ` : ''}
              </div>
            `;
          });
          gridEl.innerHTML = html;
        }

        refreshBtn.addEventListener('click', () => location.reload());
        sortSelect.addEventListener('change', applyFiltersAndSort);
        fetchData();
      }

      // ========== RENDER TEST PAGE ==========
      function renderTestPage() {
        const container = document.getElementById('mainContainer');
        container.innerHTML = `
          <div class="test-panel">
            <div class="flex items-center justify-between mb-6">
              <h1 class="text-2xl font-bold gradient-text">🧪 Error Monitoring Test Page</h1>
              <div class="flex items-center gap-2">
                <span class="text-sm">Health:</span>
                <span id="healthIndicator" class="health-indicator health-healthy"></span>
                <span id="healthText" class="text-sm">healthy</span>
              </div>
            </div>

            <div class="test-grid">
              <button class="test-button danger" id="testJsError">JavaScript Error</button>
              <button class="test-button warning" id="testNetworkError">Network Error</button>
              <button class="test-button warning" id="testWarning">Warning</button>
              <button class="test-button danger" id="testEncryptionError">Encryption Error</button>
              <button class="test-button danger" id="testSyncError">Sync Error</button>
              <button class="test-button danger" id="testErrorBoundary">Error Boundary</button>
              <button class="test-button success" id="testRunAll">▶ Run All Tests</button>
            </div>

            <div class="flex items-center justify-between mb-2">
              <h2 class="text-lg font-semibold">Test Results Console</h2>
              <button class="btn-secondary text-sm py-1" id="clearLogs">Clear Logs</button>
            </div>
            <div class="log-console" id="logConsole"></div>

            <div class="mt-6">
              <h2 class="text-lg font-semibold mb-2">Error Summary</h2>
              <table class="summary-table">
                <thead>
                  <tr><th>Type</th><th>Count</th></tr>
                </thead>
                <tbody id="summaryBody"></tbody>
              </table>
            </div>

            <div class="flex gap-3 mt-6">
              <button class="btn-primary" id="exportReport">📥 Export Error Report</button>
              <button class="btn-secondary" id="backToDashboard">← Back to Dashboard</button>
            </div>

            <!-- Simulated error boundary fallback (hidden by default) -->
            <div id="errorBoundaryFallback" class="error-boundary-fallback hidden">
              <h3 class="font-bold text-red-800 mb-2">😰 Something went wrong</h3>
              <p class="text-red-700 mb-3">This is a simulated error boundary fallback.</p>
              <button class="btn-primary" id="dismissFallback">Dismiss</button>
            </div>
          </div>
        `;

        // Get elements
        const logConsole = document.getElementById('logConsole');
        const summaryBody = document.getElementById('summaryBody');
        const healthIndicator = document.getElementById('healthIndicator');
        const healthText = document.getElementById('healthText');
        const fallbackDiv = document.getElementById('errorBoundaryFallback');

        function logToConsole(entry) {
          const line = document.createElement('div');
          line.className = `log-entry log-${entry.type}`;
          line.textContent = `[${new Date(entry.timestamp).toLocaleTimeString()}] ${entry.type.toUpperCase()}: ${entry.message}`;
          logConsole.appendChild(line);
          logConsole.scrollTop = logConsole.scrollHeight;
        }

        function updateSummary() {
          const stats = errorMonitor.getStats();
          let html = '';
          ['error', 'warning', 'network', 'sync', 'encryption', 'info'].forEach(type => {
            html += `<tr><td>${type}</td><td>${stats[type] || 0}</td></tr>`;
          });
          summaryBody.innerHTML = html;
          const health = errorMonitor.getHealthStatus();
          healthIndicator.className = `health-indicator health-${health.status}`;
          healthText.textContent = health.message;
        }

        // Listen to new errors
        const unsubscribe = errorMonitor.onError(entry => {
          logToConsole(entry);
          updateSummary();
        });

        // Load existing errors
        errorMonitor.getAllErrors().forEach(entry => logToConsole(entry));
        updateSummary();

        // Test buttons
        document.getElementById('testJsError').addEventListener('click', () => {
          try {
            throw new Error('Intentional JavaScript error');
          } catch (e) {
            errorMonitor.logError('Test JavaScript Error', { test: 'javascript-error', message: e.message });
          }
        });

        document.getElementById('testNetworkError').addEventListener('click', () => {
          errorMonitor.logNetworkError('Test network error (simulated)', { url: 'https://fake.api/test', status: 404 });
        });

        document.getElementById('testWarning').addEventListener('click', () => {
          errorMonitor.logWarning('Test warning message', { test: 'warning' });
        });

        document.getElementById('testEncryptionError').addEventListener('click', () => {
          errorMonitor.logEncryptionError('Test encryption failure', { algorithm: 'AES-GCM', reason: 'invalid key' });
        });

        document.getElementById('testSyncError').addEventListener('click', () => {
          errorMonitor.logSyncError('Test sync failure', { device: 'test-device', version: 1 });
        });

        document.getElementById('testErrorBoundary').addEventListener('click', () => {
          // Simulate component crash and show fallback
          fallbackDiv.classList.remove('hidden');
          errorMonitor.logError('Simulated error boundary caught a crash', { component: 'TestComponent' });
        });

        document.getElementById('testRunAll').addEventListener('click', () => {
          // Run all tests sequentially
          document.getElementById('testJsError').click();
          setTimeout(() => document.getElementById('testNetworkError').click(), 100);
          setTimeout(() => document.getElementById('testWarning').click(), 200);
          setTimeout(() => document.getElementById('testEncryptionError').click(), 300);
          setTimeout(() => document.getElementById('testSyncError').click(), 400);
          setTimeout(() => document.getElementById('testErrorBoundary').click(), 500);
        });

        document.getElementById('clearLogs').addEventListener('click', () => {
          errorMonitor.clear();
          logConsole.innerHTML = '';
          updateSummary();
        });

        document.getElementById('exportReport').addEventListener('click', () => {
          const report = errorMonitor.exportErrors();
          const blob = new Blob([report], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `bato-errors-${Date.now()}.json`;
          a.click();
          URL.revokeObjectURL(url);
        });

        document.getElementById('dismissFallback').addEventListener('click', () => {
          fallbackDiv.classList.add('hidden');
        });

        document.getElementById('backToDashboard').addEventListener('click', () => {
          window.location.href = window.location.pathname; // remove query params
        });
      }

      // ========== RENDER BASED ON MODE ==========
      if (isTestMode) {
        renderTestPage();
      } else {
        renderDashboard();
      }
    })();
  </script>
</body>
</html>
